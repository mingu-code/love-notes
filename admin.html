<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>문구 관리</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="admin-wrap">
    <div id="new-list-block" class="admin-hidden">
      <h1>새 문구 리스트 만들기</h1>
      <p class="sub">만들고 나면 이 페이지 주소를 꼭 저장해두세요. 이 주소가 곧 관리자 링크입니다.</p>
      <button id="create-btn">새 리스트 만들기</button>
    </div>

    <div id="editor-block" class="admin-hidden">
      <h1>문구 관리</h1>
      <p class="sub">이 페이지 주소는 나만 보관하세요. 아래 "보기 링크"만 상대방에게 공유합니다.</p>

      <div class="card">
        <textarea id="new-phrase" placeholder="새 문구를 입력하세요"></textarea>
        <div style="margin-top:10px; text-align:right;">
          <button id="add-btn">추가</button>
        </div>
      </div>

      <div class="card">
        <strong>등록된 문구 (<span id="count">0</span>)</strong>
        <ul id="phrase-list" class="phrase-list"></ul>
      </div>

      <div class="card">
        <strong>보기 링크</strong>
        <p class="sub" style="margin-top:6px;">이 링크를 상대방에게 보내세요.</p>
        <div class="link-box">
          <input id="view-link" type="text" readonly />
          <button id="copy-btn">복사</button>
        </div>
      </div>
    </div>

    <div id="error-block" class="admin-hidden">
      <h1>불러올 수 없어요</h1>
      <p class="sub" id="error-msg"></p>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
